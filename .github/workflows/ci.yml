name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dotnet-version: '6.0.x'
            tfm: net6.0
          - dotnet-version: '7.0.x'
            tfm: net7.0
          - dotnet-version: '8.0.x'
            tfm: net8.0
          - dotnet-version: '9.0.x'
            tfm: net9.0

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: |
        dotnet restore EnsureValidation.PtBr/EnsureValidation.PtBR.csproj
        dotnet restore EnsureValidation.PtBr.Tests/EnsureValidation.PtBr.Tests.csproj

    - name: Build
      run: |
        dotnet build EnsureValidation.PtBr/EnsureValidation.PtBR.csproj --no-restore --configuration Release -f ${{ matrix.tfm }}
        dotnet build EnsureValidation.PtBr.Tests/EnsureValidation.PtBr.Tests.csproj --no-restore --configuration Release -f ${{ matrix.tfm }}

    - name: Test
      run: dotnet test EnsureValidation.PtBr.Tests/EnsureValidation.PtBr.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" -f ${{ matrix.tfm }}
